<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>财签小助手 - 求签</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="诚心求签，财运自来 - 财签小助手">
</head>
<body>
    <div class="container">
        <h1 class="title">财签小助手</h1>
        <p class="subtitle">诚心求签，财运自来</p>

        <div class="shake-container">
            <div class="shake-box" id="shakeBox">
                <div class="shake-text">🔮</div>
            </div>
        </div>

        <button class="shake-btn" id="shakeBtn">摇签求财</button>

        <div class="result-container" id="resultContainer" style="display: none;">
            <div class="result-title" id="resultTitle"></div>
            <div class="result-content" id="resultContent"></div>
            <button class="reset-btn" id="resetBtn">再来一次</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
